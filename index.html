<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Muni — AI Architektka | M-unit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#F8F6F2;color:#0F0F0F;-webkit-font-smoothing:antialiased}
#root{height:100vh}
:root{--red:#E8102E;--black:#0F0F0F;--cream:#F8F6F2;--white:#fff;--gray:#888}

/* WELCOME */
.welcome{height:100vh;background:#0F0F0F;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.wi{max-width:420px;width:100%;padding:48px 28px 60px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center}
.wlogo{font-size:11px;font-weight:600;letter-spacing:.35em;color:var(--red);text-transform:uppercase;margin-bottom:36px}
.wport{width:140px;height:140px;border-radius:50%;object-fit:cover;object-position:center top;border:3px solid rgba(232,16,46,.4);box-shadow:0 0 0 6px rgba(232,16,46,.12),0 24px 60px rgba(0,0,0,.6);margin-bottom:24px}
.wbadge{background:rgba(232,16,46,.1);border:1px solid rgba(232,16,46,.2);border-radius:100px;padding:5px 16px;font-size:11px;color:var(--red);font-weight:500;letter-spacing:.08em;margin-bottom:20px}
.wtitle{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,40px);color:#fff;text-align:center;line-height:1.2;margin-bottom:16px;font-weight:600}
.wtitle em{color:var(--red);font-style:italic}
.wsub{font-size:15px;color:rgba(255,255,255,.5);text-align:center;line-height:1.7;margin-bottom:40px;max-width:320px}
.wstats{display:flex;align-items:center;gap:24px;margin-bottom:44px}
.wstat{text-align:center}
.wsn{font-family:'Playfair Display',serif;font-size:30px;color:var(--red);font-weight:700;line-height:1}
.wsl{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;margin-top:5px;line-height:1.4}
.wdiv{width:1px;height:40px;background:rgba(255,255,255,.08)}
.btn-main{background:var(--red);color:#fff;border:none;border-radius:100px;padding:18px 48px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(232,16,46,.4);transition:all .2s}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 48px rgba(232,16,46,.5)}
.wnote{font-size:12px;color:rgba(255,255,255,.2);margin-top:16px}

/* CHAT */
.chatw{height:100vh;display:flex;flex-direction:column;background:var(--cream);max-width:640px;margin:0 auto}
.chdr{background:var(--red);padding:0 18px;display:flex;align-items:center;gap:14px;min-height:66px;flex-shrink:0;box-shadow:0 2px 20px rgba(232,16,46,.4)}
.chav{width:42px;height:42px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.chinfo{flex:1}
.chname{font-weight:700;font-size:17px;color:#fff}
.chsub{font-size:11px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:5px;margin-top:1px}
.sdot{width:6px;height:6px;background:#4ade80;border-radius:50%}
.chco{font-size:11px;color:rgba(255,255,255,.45);font-weight:400}
.prog{height:4px;background:rgba(0,0,0,.1);flex-shrink:0;position:relative}
.progf{height:100%;background:linear-gradient(90deg,#E8102E,#ff4444);transition:width .6s ease;box-shadow:0 0 8px rgba(232,16,46,.5)}
.progp{position:absolute;right:14px;top:5px;font-size:10px;color:var(--red);font-weight:700}
.msgs{flex:1;overflow-y:auto;padding:20px 18px 12px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:4px}
.msg{display:flex;gap:10px;max-width:88%;animation:msgIn .3s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.mav{width:30px;height:30px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;margin-top:2px}
.mb{padding:13px 17px;border-radius:20px;font-size:15px;line-height:1.6;white-space:pre-wrap}
.msg.ai .mb{background:#fff;color:#0F0F0F;border:1px solid rgba(0,0,0,.06);border-bottom-left-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.msg.user .mb{background:var(--red);color:#fff;border-bottom-right-radius:5px}
.typing{display:flex;gap:5px;align-items:center;padding:14px 17px}
.tdot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:tdot 1.2s infinite;opacity:.4}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
.photo-upload-msg{background:#fff;border:1.5px dashed rgba(232,16,46,.3);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;max-width:300px}
.photo-upload-msg:hover{border-color:var(--red);background:rgba(232,16,46,.03)}
.pum-title{font-weight:600;font-size:14px;color:#0F0F0F;margin-bottom:4px}
.pum-sub{font-size:12px;color:var(--gray);line-height:1.5}
.pum-thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.pum-thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid var(--red)}
.pum-done{background:var(--red);color:#fff;border:none;border-radius:100px;padding:8px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;width:100%}
.qrs{padding:8px 18px 6px;display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0}
.qr{background:#fff;border:1.5px solid var(--red);color:var(--red);border-radius:100px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.qr:hover{background:var(--red);color:#fff}
.inpw{padding:12px 18px 20px;display:flex;gap:10px;flex-shrink:0;background:#fff;border-top:1px solid rgba(0,0,0,.05);align-items:flex-end}
.cinp{flex:1;border:1.5px solid rgba(0,0,0,.1);border-radius:24px;padding:12px 18px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;resize:none;max-height:100px;transition:border-color .2s;line-height:1.4;background:var(--cream);color:#0F0F0F}
.cinp:focus{border-color:var(--red);background:#fff}
.sbtn{width:44px;height:44px;border-radius:50%;background:var(--red);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s;box-shadow:0 4px 16px rgba(232,16,46,.4)}
.sbtn:hover{transform:scale(1.08)}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* EMAIL */
.fscr{height:100vh;overflow-y:auto;background:var(--cream)}
.scri{max-width:440px;margin:0 auto;padding:48px 28px 60px;display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center}
.scrav{width:72px;height:72px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--red);margin-bottom:24px}
.scrt{font-family:'Playfair Display',serif;font-size:28px;color:#0F0F0F;text-align:center;margin-bottom:12px;font-weight:600}
.scrs{font-size:15px;color:var(--gray);text-align:center;line-height:1.65;margin-bottom:32px}
.fg{width:100%;max-width:360px;margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#444;display:block;margin-bottom:6px}
.fl .opt{color:#aaa;font-weight:400}
.fi{width:100%;border:1.5px solid rgba(0,0,0,.1);border-radius:12px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;background:#fff;color:#0F0F0F}
.fi:focus{border-color:var(--red)}
.fi-note{font-size:12px;color:#aaa;margin-top:6px;line-height:1.5}
.gdpr{display:flex;align-items:flex-start;gap:10px;max-width:360px;margin-bottom:20px}
.gdpr input{width:16px;height:16px;accent-color:var(--red);margin-top:2px;flex-shrink:0}
.gdprt{font-size:12px;color:#999;line-height:1.5}
.gdprt a{color:var(--red);text-decoration:none}
.ferr{color:var(--red);font-size:13px;margin-bottom:12px}
.btn-sec{background:transparent;color:var(--gray);border:1.5px solid rgba(0,0,0,.12);border-radius:100px;padding:13px 32px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%;max-width:360px;margin-top:8px}
.btn-sec:hover{border-color:#aaa;color:#444}

/* GENERATING */
.genscr{height:100vh;background:#0F0F0F;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.gent{font-family:'Playfair Display',serif;font-size:28px;color:#fff;text-align:center;margin-bottom:8px}
.gens{font-size:14px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:40px}
.gensteps{width:100%;max-width:360px;display:flex;flex-direction:column;gap:0;margin-bottom:36px}
.genstep{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.gico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.genstep.done .gico{background:rgba(74,222,128,.12)}
.genstep.active .gico{background:rgba(232,16,46,.15);animation:pulse 1.4s infinite}
.genstep.pending .gico{background:rgba(255,255,255,.05)}
.gtxt{font-size:14px;color:rgba(255,255,255,.45)}
.genstep.active .gtxt{color:#fff;font-weight:500}
.genstep.done .gtxt{color:rgba(74,222,128,.7)}
.gtrack{width:100%;max-width:360px;height:3px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.gfill{height:100%;background:linear-gradient(90deg,var(--red),#ff6060);border-radius:4px;transition:width 1s ease}
.gpct{font-family:'Playfair Display',serif;font-size:44px;color:var(--red);margin-top:14px;font-weight:700}

/* PDF SCREEN */
.pdfscr{height:100vh;display:flex;flex-direction:column;background:#111}
.pdfhdr{background:var(--red);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pdft{font-family:'Playfair Display',serif;font-size:18px;color:#fff}
.pdfs{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.btn-dl{background:#fff;color:var(--red);border:none;border-radius:100px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-dl:hover{background:var(--cream)}
.pdfbody{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;align-items:center}
.pdfcard{background:#fff;border-radius:12px;overflow:hidden;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.pdfci{padding:24px}
.ctacard{background:var(--red);border-radius:12px;padding:24px;width:100%;max-width:440px}

/* ANIMATIONS */
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,16,46,.3)}50%{box-shadow:0 0 0 8px transparent}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>

// ─── API ──────────────────────────────────────────────────────────────────────
async function callClaude(messages) {
  const r = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1200,
      system:SYSTEM_PROMPT,
      messages
    })
  });
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text||'';
}

async function generateImage(prompt) {
  const r = await fetch('https://fal.run/fal-ai/flux/schnell',{
    method:'POST',
    headers:{'Authorization':`Key ${FAL_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({prompt,image_size:'landscape_4_3',num_inference_steps:4,num_images:1})
  });
  const d = await r.json();
  return d.images?.[0]?.url||null;
}

async function faceSwap(sceneUrl, faceDataUrl) {
  try {
    const r = await fetch('https://fal.run/fal-ai/face-swap',{
      method:'POST',
      headers:{'Authorization':`Key ${FAL_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({base_image_url:sceneUrl,swap_image_url:faceDataUrl})
    });
    const d = await r.json();
    return d.image?.url||d.images?.[0]?.url||null;
  } catch(e) { return null; }
}

async function toDataUrl(url) {
  try {
    const r = await fetch(url);
    const b = await r.blob();
    return new Promise(res=>{const rd=new FileReader();rd.onloadend=()=>res(rd.result);rd.readAsDataURL(b);});
  } catch{return null;}
}

// ─── PARSE ────────────────────────────────────────────────────────────────────
function parseCRM(text) {
  const m = text.match(/\[CRM_START\]([\s\S]*?)\[CRM_END\]/);
  if(!m) return null;
  const raw = m[1];
  const get = k => { const r=raw.match(new RegExp(k+':\s*(.+)')); return r?r[1].trim():''; };
  return {
    meno:get('MENO'),faza:get('FAZA'),lokalita:get('LOKALITA'),
    typDomu:get('TYP_DOMU'),plocha:get('PLOCHA'),rodina:get('RODINA'),
    rozpocet:get('ROZPOCET'),casovyRamec:get('CASOVY_RAMEC'),
    styl:get('STYL'),technologie:get('TECHNOLOGIE'),
    topPriority:get('TOP_PRIORITY'),sportVybavenie:get('SPORT_VYBAVENIE'),
    specialne:get('SPECIALNE'),izby:get('IZBY'),wowPrvky:get('WOW_PRVKY')
  };
}
function parseOpts(text) {
  const m = text.match(/\[OPT:\s*([^\]]+)\]/);
  if(!m) return [];
  return m[1].split('|').map(s=>s.trim()).filter(Boolean);
}
function clean(text) {
  return text
    .replace(/\[OPT:[^\]]*\]/g,'')
    .replace(/\[FAZA:[^\]]*\]/g,'')
    .replace(/\[CRM_START\][\s\S]*?\[CRM_END\]/g,'')
    .replace(/\[READY_FOR_EMAIL\]/g,'')
    .replace(/\[SHOW_PHOTO_UPLOAD\]/g,'')
    .replace(/\[CHCE_KONZULTACIU\]/g,'')
    .trim();
}

// Compress image data URL to smaller size for PDF
async function compressImg(dataUrl, maxW=800, quality=0.75) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = img.width * scale;
      c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  });
}

function Chat({onReady, onCRM}) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [opts, setOpts] = useState([]);
  const [progress, setProgress] = useState(4);
  const [showUpload, setShowUpload] = useState(false);
  const [photos, setPhotos] = useState([]);
  const [photosDone, setPhotosDone] = useState(false);
  const bottomRef = useRef(null);
  const histRef = useRef([]);
  const startedRef = useRef(false);
  const fileRef = useRef(null);

  useEffect(()=>{
    if(startedRef.current) return;
    startedRef.current = true;
    chat(null,true);
  },[]);

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:'smooth'});
  },[msgs,loading,showUpload]);

  async function chat(userText, isFirst=false) {
    setLoading(true);
    setOpts([]);
    if(!isFirst && userText) {
      const um = {role:'user',content:userText};
      setMsgs(p=>[...p,um]);
      histRef.current = [...histRef.current,um];
    }
    try {
      const initMsg = [{role:'user',content:'Začni rozhovor — pozdrav zákazníka.'}];
      const resp = await callClaude(isFirst ? initMsg : histRef.current);
      const crm = parseCRM(resp);
      if(crm) onCRM(crm);
      const showPhoto = resp.includes('[SHOW_PHOTO_UPLOAD]');
      const ready = resp.includes('[READY_FOR_EMAIL]');
      const parsedOpts = parseOpts(resp);
      const cleaned = clean(resp);
      const aiMsg = {role:'assistant',content:cleaned};
      setMsgs(p=>isFirst?[aiMsg]:[...p,aiMsg]);
      histRef.current = isFirst?[aiMsg]:[...histRef.current,aiMsg];
      setOpts(parsedOpts);
      const uc = histRef.current.filter(m=>m.role==='user').length;
      setProgress(Math.min(92, 4+uc*7));
      if(showPhoto) { setShowUpload(true); }
      if(ready) { setTimeout(()=>onReady(),1000); }
    } catch(e) {
      setMsgs(p=>[...p,{role:'assistant',content:'Prepáč, nastala chyba. Skús znova.'}]);
    }
    setLoading(false);
  }

  function send() {
    const v = input.trim();
    if(!v||loading) return;
    setInput('');
    chat(v);
  }

  function handleFiles(e) {
    Array.from(e.target.files).forEach(f=>{
      const r = new FileReader();
      r.onload = ev => setPhotos(p=>[...p,ev.target.result]);
      r.readAsDataURL(f);
    });
  }

  function confirmPhotos() {
    setPhotosDone(true);
    setShowUpload(false);
    const msg = photos.length > 0
      ? `Nahrával som ${photos.length} fotiek!`
      : 'Preskočím fotky.';
    chat(msg);
  }

  return (
    <div className="chatw">
      <div className="chdr">
        <img src={MUNI} alt="Muni" className="chav"/>
        <div className="chinfo">
          <div className="chname">Muni</div>
          <div className="chsub"><span className="sdot"/>AI Architektka</div>
        </div>
        <div className="chco">M-unit, s.r.o.</div>
      </div>
      <div className="prog">
        <div className="progf" style={{width:`${progress}%`}}/>
        <div className="progp">{Math.round(progress)}%</div>
      </div>
      <div className="msgs">
        {msgs.map((m,i)=>(
          <div key={i} className={`msg ${m.role==='assistant'?'ai':'user'}`}>
            {m.role==='assistant'&&<img src={MUNI} alt="Muni" className="mav"/>}
            <div className="mb">{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div className="msg ai">
            <img src={MUNI} alt="Muni" className="mav"/>
            <div className="mb"><div className="typing"><div className="tdot"/><div className="tdot"/><div className="tdot"/></div></div>
          </div>
        )}
        {showUpload&&!photosDone&&(
          <div className="msg ai" style={{maxWidth:'100%'}}>
            <img src={MUNI} alt="Muni" className="mav"/>
            <div>
              <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleFiles}/>
              <div className="photo-upload-msg" onClick={()=>fileRef.current?.click()}>
                <div className="pum-title">📸 Nahraj fotky rodiny</div>
                <div className="pum-sub">3-5 fotiek pre najlepší výsledok<br/>selfie · celá rodina · deti<br/>Čím viac, tým realistickejší dom</div>
                {photos.length>0&&<div className="pum-thumbs">{photos.map((p,i)=><img key={i} src={p} alt="" className="pum-thumb"/>)}</div>}
              </div>
              <button className="pum-done" style={{marginTop:8}} onClick={confirmPhotos}>
                {photos.length>0?`Pokračovať s ${photos.length} fotkami →`:'Preskočiť — bude to aj tak krásne'}
              </button>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {opts.length>0&&!showUpload&&(
        <div className="qrs">
          {opts.map((o,i)=><button key={i} className="qr" onClick={()=>chat(o)}>{o}</button>)}
        </div>
      )}
      <div className="inpw">
        <textarea
          className="cinp"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Napíš správu..."
          rows={1}
          disabled={loading||showUpload}
        />
        <button className="sbtn" onClick={send} disabled={loading||!input.trim()||showUpload}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

function Email({onSubmit}) {
  const [email,setEmail] = useState('');
  const [phone,setPhone] = useState('');
  const [gdpr,setGdpr] = useState(false);
  const [err,setErr] = useState('');

  function submit() {
    if(!email.includes('@')||!email.includes('.')) { setErr('Zadaj platný email.'); return; }
    if(!phone||phone.length<9) { setErr('Telefónne číslo je povinné.'); return; }
    if(!gdpr) { setErr('Súhlas s GDPR je povinný.'); return; }
    setErr('');
    onSubmit({email,phone});
  }

  return (
    <div className="fscr">
      <div className="scri">
        <img src={MUNI} alt="Muni" className="scrav"/>
        <h2 className="scrt">Takmer hotovo!</h2>
        <p className="scrs">Kam ti mám poslať návrh tvojho domu?</p>
        <div className="fg">
          <label className="fl">Email *</label>
          <input className="fi" type="email" placeholder="tvoj@email.sk" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="fg">
          <label className="fl">Telefón *</label>
          <input className="fi" type="tel" placeholder="+421 9XX XXX XXX" value={phone} onChange={e=>setPhone(e.target.value)}/>
          <p className="fi-note">Zavoláme ti keď bude tvoj návrh pripravený — jeden príjemný hovor.</p>
        </div>
        <div className="gdpr">
          <input type="checkbox" checked={gdpr} onChange={e=>setGdpr(e.target.checked)}/>
          <p className="gdprt">Súhlasím so spracovaním osobných údajov firmou M-unit s.r.o. podľa <a href="https://m-unit.sk/privacy-policy" target="_blank">Privacy Policy</a>. Údaje použijeme výhradne na zaslanie návrhu a kontakt.</p>
        </div>
        {err&&<p className="ferr">{err}</p>}
        <button className="btn-main" onClick={submit}>Vygenerovať môj dom ✨</button>
      </div>
    </div>
  );
}

function Generating({crm, photos, onDone}) {
  const [step, setStep] = useState(0);
  const [pct, setPct] = useState(0);
  const runRef = useRef(false);
  const prompts = buildPrompts(crm);

  const steps = [
    {label:'Analyzujem váš rozhovor...',icon:'🧠'},
    ...prompts.map(p=>({label:`Generujem: ${p.label}`,icon:'🏠'})),
    {label:'Vkladám vašu rodinu do scén...',icon:'👨‍👩‍👧'},
    {label:'Skladám prémiové PDF...',icon:'📄'},
    {label:'Hotovo!',icon:'✅'},
  ];

  useEffect(()=>{
    if(runRef.current) return;
    runRef.current = true;
    run();
  },[]);

  async function run() {
    setStep(0); setPct(5);
    await delay(1000);
    const imgs = {};
    for(let i=0;i<prompts.length;i++) {
      setStep(i+1);
      setPct(Math.round(10+(i/prompts.length)*55));
      try {
        const url = await generateImage(prompts[i].prompt);
        if(url) {
          const du = await toDataUrl(url);
          if(du) {
            imgs[prompts[i].key] = du;

          }
        }
      } catch(e) { console.warn('img fail',e); }
    }
    setStep(steps.length-3); setPct(75);
    await delay(500);
    setStep(steps.length-2); setPct(88);
    const doc = await buildPDF(crm, imgs, (p)=>setPct(p));
    setStep(steps.length-1); setPct(100);
    await delay(600);
    onDone(doc, imgs);
  }

  return (
    <div className="genscr">
      <div className="gent">Tvoríme váš dom...</div>
      <div className="gens">AI generuje vizualizácie špeciálne pre vás</div>
      <div className="gensteps">
        {steps.map((s,i)=>{
          const st = i<step?'done':i===step?'active':'pending';
          return (
            <div key={i} className={`genstep ${st}`}>
              <div className="gico">{st==='done'?'✅':st==='active'?s.icon:'○'}</div>
              <div className="gtxt">{s.label}</div>
            </div>
          );
        })}
      </div>
      <div className="gtrack"><div className="gfill" style={{width:`${pct}%`}}/></div>
      <div className="gpct">{pct}%</div>
    </div>
  );
}

function PDFResult({doc, crm}) {
  function download() {
    const n = (crm?.meno||'moj-dom').replace(/\s+/g,'-');
    doc.save(`Muni-navrh-${n}.pdf`);
  }
  const cta = ctaText(crm?.faza, crm);
  return (
    <div className="pdfscr">
      <div className="pdfhdr">
        <div>
          <div className="pdft">Váš návrh je hotový! 🎉</div>
          <div className="pdfs">Stiahnite PDF a zdieľajte s rodinou</div>
        </div>
        <button className="btn-dl" onClick={download}>⬇ Stiahnuť PDF</button>
      </div>
      <div className="pdfbody">
        <div className="pdfcard">
          <div className="pdfci">
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:'#E8102E',marginBottom:6}}>{crm?.meno||'Váš dom'}</div>
            <div style={{fontSize:13,color:'#888',marginBottom:20}}>Personalizovaný architektonický návrh</div>
            {[['Typ stavby',crm?.typDomu],['Štýl',crm?.styl],['Rodina',crm?.rodina],['Lokalita',crm?.lokalita],['Rozpočet',crm?.rozpocet]].map(([l,v])=>v?(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #f0eded',fontSize:14}}>
                <span style={{color:'#888'}}>{l}</span>
                <span style={{fontWeight:500,textAlign:'right',maxWidth:'55%'}}>{v}</span>
              </div>
            ):null)}
          </div>
        </div>
        <div className="ctacard">
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:'#fff',marginBottom:10,fontWeight:600}}>{cta.title}</div>
          <div style={{fontSize:14,color:'rgba(255,255,255,.85)',lineHeight:1.65,marginBottom:20}}>{cta.desc}</div>
          <div style={{fontSize:18,fontWeight:700,color:'#fff'}}>📞 0905 621 441</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.6)',marginTop:4}}>mario@m-unit.sk · www.m-unit.sk</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:2}}>Zavoláme vám do 24 hodín.</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('welcome');
  const [crm, setCrm] = useState(null);
  const [photos, setPhotos] = useState([]);
  const [pdfDoc, setPdfDoc] = useState(null);

  return (
    <div style={{height:'100vh',overflow:'hidden'}}>
      {screen==='welcome'&&<Welcome onStart={()=>setScreen('chat')}/>}
      {screen==='chat'&&<Chat onReady={()=>setScreen('generating')} onCRM={d=>setCrm(prev=>({...prev,...d}))}/>}
      
      {screen==='generating'&&<Generating crm={crm} photos={photos} onDone={(doc)=>{setPdfDoc(doc);setScreen('pdf');}}/>}
      {screen==='email'&&<Email onSubmit={()=>setScreen('pdf')}/>}
      {screen==='pdf'&&<PDFResult doc={pdfDoc} crm={crm}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
